# yaml-language-server: $schema=https://squidfunk.github.io/mkdocs-material/schema.json

site_name: MSP430 LCD API
site_url: https://element21.github.io/MSP430-Stopwatch/
theme:
  name: material

docs_dir: docs-not-gh-pages

nav:
  - Home: index.md
  - API Reference: api.md
  - Examples: examples.md

markdown_extensions:
  - pymdownx.snippets
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences